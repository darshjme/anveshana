      <animate attributeName="fill-opacity" values="0.12;0.4;0.12" dur="2.4s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="77" y="134" fill="#1f6feb" font-size="9" text-anchor="middle" font-family="monospace">A10</text>
